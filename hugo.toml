baseURL = 'https://stumbl.ing/'
languageCode = 'en-us'
title = "stumbl.ing"
#theme = "hugo-xterm"
paginate = 20

[module]
  [[module.imports]]
    path = "github.com/manid2/hugo-xterm"

[params]
author = "lockbox"
showMenuItems = true

[markup.goldmark.renderer]
unsafe = true

[languages]
  [languages.en.params]
    copyright = "© lockbox"
    readOtherPosts = "Read other posts"
    missingContentMessage = "Page not found..."
    missingBackButtonLabel = "Back to home page"

    [languages.en.params.logo]
      logoText = "Home"

    [languages.en.menu]
      [[languages.en.menu.main]]
        identifier = "posts"
        name = "Posts"
        url = "/posts/"

      [[languages.en.menu.main]]
        identifier = "wiki"
        name = "Wiki"
        url = "/wiki/"

      [[languages.en.menu.main]]
        identifier = "about"
        name = "About"
        url = "/about/"

[markup]
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 3
    ordered = false

  [markup.highlight]
    anchorLineNos = false
    codeFences = true
    guessSyntax = false
    hl_Lines = ''
    hl_inline = false
    lineNoStart = 1
    lineNos = false
    lineNumbersInTable = false
    noClasses = false
